# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# https://docs.gradle.org/current/userguide/build_environment.html

# JVM memory for the Gradle daemon
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# Kotlin code style
kotlin.code.style=official

# R class namespacing
android.nonTransitiveRClass=true

# Disable configuration cache — required for stable Android Studio sync
org.gradle.configuration-cache=false

# Disable build caching to prevent stale model issues during IDE sync
org.gradle.caching=false

# Disable parallel to avoid task-ordering conflicts during IDE sync
org.gradle.parallel=false

# Keep the daemon alive for IDE sync
org.gradle.daemon=true
