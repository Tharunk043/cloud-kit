version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: bitecraft-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: bitecraft-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:28082,OUTSIDE://0.0.0.0:8082
      - --advertise-pandaproxy-addr PLAINTEXT://redpanda:28082,OUTSIDE://localhost:8082
    ports:
      - "8082:8082"
      - "9092:9092"
      - "28082:28082"
      - "29092:29092"
    volumes:
      - redpanda_data:/var/lib/redpanda
    restart: always

volumes:
  redis_data:
    driver: local
  redpanda_data:
    driver: local
